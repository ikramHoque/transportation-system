# Auto-loaded by plain `docker compose up` (no -f flags) alongside
# docker-compose.yml -- this is what gives local/dev usage its exposed port.
# Deliberately NOT merged in when docker-compose.prod.yml is used explicitly
# via `-f`, since Compose only auto-includes this file when no -f flags are
# given at all; that's what keeps the production overlay from ending up
# with both this port mapping *and* prod's 80/443 bound at once (list
# fields like `ports` merge across -f files rather than replace).
services:
  frontend:
    ports:
      - "${APP_PORT:-8080}:80"
